<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Basketball Scoreboard</title>
</head>
<body>
    <script src="index.js"></script>
    <div class ="scoreboard">
        <div class="clock">
            <p class="hours">00</p>
            <p class="seperator">:</p>
            <p class="minutes">00</p>
            <p class="seperator">:</p>
            <p class="seconds">00</p>    
        </div>
    <div class="scorecard">
        <div class="team home">
            <h2>HOME</h2>
            <p class="clock">0</p>
                <div class="fscore">
                    <h4>FOULS</h4>
                    <p class="clock">0</p>
                </div>
            <div class="buttons">
                <button class="add1">+1</button>
                <button class="add2">+2</button>
                <button class="add3">+3</button>
        </div>
        </div>
    <div class="middle">
        <h4>PERIOD</h4>
        <p class="clock">1</p>
        <img src="image/mascot-logo.png" alt="logo">
        <button class="btn-newgame">New Game</button>
    </div>
        <div class="team away">
            <h2>AWAY</h2>
            <p class="clock">0</p>
            <div class="fscore"></div>
                <h4>FOULS</h4>
                <p class="clock">0</p>
            <div class="buttons">
                <button class="add1">+1</button>
                <button class="add2">+2</button>
                <button class="add3">+3</button>        
        </div>
    </div>
    </div>
    </div>
</body>
</html>
